test_battery_state_broadcaster:
  ros__parameters:
    state_joints:
      - "module1"
      - "module2"
    interfaces:
      module1:
        battery_temperature: true
        battery_current: false
        battery_charge: true
        battery_percentage: false
        battery_power_supply_status: true
        battery_power_supply_health: true
        battery_present: false
        battery_cell_voltage: false
        battery_cell_temperature: false
      module2:
        battery_temperature: true
        battery_current: true
        battery_charge: true
        battery_percentage: true
        battery_power_supply_status: true
        battery_power_supply_health: true
        battery_present: false
        battery_cell_voltage: true
        battery_cell_temperature: true
    module1:
      minimum_voltage: 0.0
      maximum_voltage: 10.0
      capacity: 12000.0
      design_capacity: 13000.0
      power_supply_technology: 3
      location: "module1_slot"
      serial_number: "module1_serial_device"
      cell_count: 0
    module2:
      minimum_voltage: 0.0
      maximum_voltage: 15.0
      capacity: 17000.0
      design_capacity: 18000.0
      power_supply_technology: 3
      location: "module2_slot"
      serial_number: "module2_serial_device"
      cell_count: 2
