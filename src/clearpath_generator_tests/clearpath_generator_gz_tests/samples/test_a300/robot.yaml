serial_number: a300-00000
version: 0
system:
  hosts:
    - hostname: cpr-a300-00000
      ip: 192.168.131.1
  ros2:
    namespace: a300_00000
platform:
  battery:
    model: S_24V20_U1
    configuration: S1P2
  attachments:
    # Bumpers
    - name: front_bumper
      type: a300.bumper
      parent: front_bumper_mount
      model: default
      extension: 0.2
    - name: rear_bumper
      type: a300.bumper
      parent: rear_bumper_mount
      model: default
      extension: 0.2
    # Top Plate
    - name: top_plate_default
      type: a300.top_plate
      model: default
      xyz: [0.0, -1.0, 0.0]
    - name: top_plate_pacs
      type: a300.top_plate
      model: pacs
      xyz: [0.0, 1.0, 0.0]
    # Wireless Charger
    - name: wireless_charger
      type: a300.wireless_charger
      model: default
    # AMP
    - name: enclosure
      type: a300.amp_enclosure
      parent: base_link
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
    - name: sensor_arch
      type: a300.amp_sensor_arch
      parent: enclosure_antenna_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
    - name: driving_light_1
      type: a300.spotlight
      parent: sensor_arch_front_left_corner_mount
      xyz: [0.0, 0.0, -0.08]
      rpy: [0.0, 0.5235987755982988, 0.5235987755982988]
    - name: driving_light_2
      type: a300.spotlight
      parent: sensor_arch_front_right_corner_mount
      xyz: [0.0, 0.0, -0.08]
      rpy: [0.0, 0.5235987755982988, -0.5235987755982988]
    - name: driving_light_3
      type: a300.spotlight
      parent: sensor_arch_rear_left_corner_mount
      xyz: [0.0, 0.0, -0.08]
      rpy: [0.0, 0.5235987755982988, -0.5235987755982988]
    - name: driving_light_4
      type: a300.spotlight
      parent: sensor_arch_rear_right_corner_mount
      xyz: [0.0, 0.0, -0.08]
      rpy: [0.0, 0.5235987755982988, 0.5235987755982988]
sensors:
  imu:
    - model: phidgets_spatial
      urdf_enabled: true
      launch_enabled: true
      parent: base_link
      xyz: [0.059, 0.0, 0.161275]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        phidgets_spatial:
          data_interval_ms: 20
mounts:
  # Risers
  riser:
    - parent: top_plate_pacs_mount_a1
      xyz: [0.0, 0.0, 0.1]
      rpy: [0.0, 0.0, 0.0]
      rows: 8 # rows of 80mm x 80mm grid
      columns: 7 # columns of 80mm x 80mm grid
      thickness: 0.00635
    - parent: top_plate_pacs_mount_a8
      xyz: [0.0, 0.0, 0.2]
      rpy: [0.0, 0.0, 0.0]
      rows: 1 # rows of 80mm x 80mm grid
      columns: 7 # columns of 80mm x 80mm grid
      thickness: 0.00635
    - parent: top_plate_pacs_mount_c1
      xyz: [0.0, 0.0, 0.3]
      rpy: [0.0, 0.0, 0.0]
      rows: 4 # rows of 80mm x 80mm grid
      columns: 4 # columns of 80mm x 80mm grid
      thickness: 0.00635
